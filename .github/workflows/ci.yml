name: CI

on:
  pull_request:
  push:
    branches: [main]

# One in-flight run per ref; a new push cancels the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Both `check-types` and `build` import the validated app environment. These
    # values prove that contract without granting CI access to any live service.
    env:
      AUTH_SECRET: ci-not-a-real-secret-do-not-use
      AUTH_TRUST_HOST: 'true'
      TURSO_DATABASE_URL: 'file:local.db'
    steps:
      - uses: actions/checkout@v7

      # Reads the pnpm version from package.json#packageManager.
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Each script fans out through Turbo (turbo run <task>), so package-level
      # tasks run in dependency order and hit the local Turbo cache.
      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm check-types

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
